# WPMoo local development overlay.

services:
  db:
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./postgresql:/var/lib/postgresql/18/docker

  odoo:
    ports:
      - "${HTTP_PORT:-10019}:8069"
      - "${GEVENT_PORT:-20019}:8072"
    volumes:
      - ./resources/odoo/entrypoint.sh:/entrypoint.sh:ro
      - ./addons:/mnt/extra-addons
      - ./odoo/custom/src/private:/mnt/wpmoo-src/private
      - ./config/odoo:/etc/odoo
      - ./data:/var/lib/odoo
